# Phoenix Marketing Intelligence Engine — Runtime Configuration
# =============================================================
# This file centralises all tunable parameters. Environment variables
# (.env) still override values here for secrets (API keys, tokens).
# Edit this file to change worker intervals, thresholds, and limits
# without restarting the server.

# ── LLM Models ──────────────────────────────────────────────────
llm:
  generation_model: "llama-3.3-70b-versatile"
  fast_model: "llama-3.1-8b-instant"
  temperature_generation: 0.7
  temperature_scoring: 0.1
  max_tokens_generation: 4096
  max_tokens_scoring: 128

# ── Worker Schedules ────────────────────────────────────────────
workers:
  signal:
    interval_hours: 6
    enabled: true
  insight:
    interval_hours: 12
    enabled: true
  content:
    interval_hours: 24
    enabled: true
  distribution:
    interval_minutes: 30
    enabled: true
  analytics:
    interval_hours: 24
    enabled: true
  engagement:
    interval_hours: 2
    enabled: true

# ── Signal Engine ───────────────────────────────────────────────
signals:
  sources_file: "signal_sources.json"
  score_weights:
    keyword: 0.25
    source: 0.15
    freshness: 0.10
    semantic: 0.50
  freshness_half_life_hours: 48
  batch_size: 10

# ── Content Engine ──────────────────────────────────────────────
content:
  confidence_threshold: 0.5
  max_per_cycle: 20
  default_types:
    - blog_post
    - linkedin_post

# ── Engagement Engine ───────────────────────────────────────────
engagement:
  relevance_threshold: 0.6
  daily_limits:
    max_likes: 50
    max_comments: 20
  viral_detection:
    likes_multiplier: 3.0
    comments_multiplier: 2.0
    min_samples: 3
    fallback_likes_threshold: 100
    fallback_comments_threshold: 20
  hashtag_scan:
    max_hashtags_per_cycle: 5
    scrolls_per_tag: 2
  browser:
    headless: true
    max_retries: 2
    human_delay_min: 1.5
    human_delay_max: 4.0

# ── Distribution ────────────────────────────────────────────────
distribution:
  channels:
    - website
    - linkedin
  retry_failed_after_hours: 6

# ── Pipeline ────────────────────────────────────────────────────
pipeline:
  default_steps: [1, 2, 3, 4, 5, 6, 7]
  enable_engagement_step: false  # Step 8 — opt-in

# ── API Server ──────────────────────────────────────────────────
api:
  host: "127.0.0.1"
  port: 8000
  cors_origins:
    - "http://localhost:3000"
    - "http://127.0.0.1:8000"
